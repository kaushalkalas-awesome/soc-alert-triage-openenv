# Docker Compose for SOC Alert Triage OpenEnv
# This file enables easy local testing and development

version: '3.8'

services:
  soc-openenv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc_alert_triage_env
    ports:
      - "7860:7860"
    environment:
      - API_PORT=7860
      - PYTHONPATH=/app/env:$PYTHONPATH
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    
  # Optional: Add a volume for persistent data if needed
  # volumes:
  #   - ./data:/app/data

# Networks (optional customization)
# networks:
#   default:
#     name: soc_openenv_network
